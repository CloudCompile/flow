name: 'FlowAI Bot'
description: 'AI coding assistant via Pollinations. Mention @flowai in PRs or issues to review, fix, and build code.'
author: 'CloudCompile'

branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  pollinations_api_key:
    description: 'Your Pollinations API key from enter.pollinations.ai'
    required: true
  model:
    description: 'Pollinations model to use (glm, claude, openai-large, gemini, etc.)'
    required: false
    default: 'glm'
  max_tokens:
    description: 'Max tokens for AI response'
    required: false
    default: '32000'
  github_token:
    description: 'GitHub token for API access and committing changes'
    required: true
    default: ${{ github.token }}

runs:
  using: 'node20'
  main: 'dist/index.js'